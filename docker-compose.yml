version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: retailpulse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retailpulse}
      POSTGRES_USER: ${POSTGRES_USER:-retailuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retailuser} -d ${POSTGRES_DB:-retailpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retailpulse_net

  # ── Python ETL Pipeline ─────────────────────────────────────────
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: retailpulse_etl
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-retailpulse}
      POSTGRES_USER: ${POSTGRES_USER:-retailuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      ETL_BATCH_SIZE: ${ETL_BATCH_SIZE:-1000}
      ETL_LOG_LEVEL: ${ETL_LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - retailpulse_net

  # ── Flask REST API ───────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: retailpulse_api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-retailpulse}
      POSTGRES_USER: ${POSTGRES_USER:-retailuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-secret}
    ports:
      - "${FLASK_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - retailpulse_net

  # ── PgAdmin (optional UI) ────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: retailpulse_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@retailpulse.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "8080:80"
    depends_on:
      - postgres
    profiles:
      - admin
    networks:
      - retailpulse_net

volumes:
  postgres_data:
    name: retailpulse_pgdata

networks:
  retailpulse_net:
    name: retailpulse_network
    driver: bridge
